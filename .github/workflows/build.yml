name: KunLun Penetration Testing Platform - Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller "pyarmor==7.7.4"
          pip install -r requirements.txt

      - name: Verify PyArmor installation
        run: |
          pyarmor --version

      - name: Run PyArmor encryption
        run: |
          python pyarmor_obfuscate.py
        working-directory: ${{ github.workspace }}

      - name: Build with PyInstaller
        run: |
          set ENCRYPTED_BUILD=1
          pyinstaller kunlun.spec --clean
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunlun-windows
          path: dist/kunlun.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kunlun.exe
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libffi-dev python3-dev build-essential \
              libx11-xcb1 libxcb-xkb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
              libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
              libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libxcb1 \
              libgl1-mesa-glx libgl1-mesa-dri

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller "pyarmor==7.7.4"
          pip install -r requirements.txt

      - name: Verify PyArmor installation
        run: |
          pyarmor --version

      - name: Run PyArmor encryption
        run: |
          python pyarmor_obfuscate.py
        working-directory: ${{ github.workspace }}

      - name: Build with PyInstaller
        run: |
          ENCRYPTED_BUILD=1 pyinstaller kunlun.spec --clean
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunlun-linux
          path: dist/kunlun

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kunlun
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          brew install openssl@3

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller "pyarmor==7.7.4"
          pip install -r requirements.txt

      - name: Verify PyArmor installation
        run: |
          pyarmor --version

      - name: Run PyArmor encryption
        run: |
          python pyarmor_obfuscate.py
        working-directory: ${{ github.workspace }}

      - name: Build with PyInstaller
        run: |
          ENCRYPTED_BUILD=1 pyinstaller kunlun.spec --clean
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunlun-macos
          path: dist/kunlun

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -r dist/KunLun.app dist/dmg/
          hdiutil create -volname "KunLun" -srcfolder dist/dmg -ov -format UDZO dist/kunlun.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kunlun
            dist/kunlun.dmg
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate Builds
    runs-on: ubuntu-22.04
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Validate Linux binary
        run: |
          chmod +x artifacts/kunlun-linux/kunlun
          file artifacts/kunlun-linux/kunlun

      - name: Validate Windows binary
        run: |
          file artifacts/kunlun-windows/kunlun.exe

      - name: Validate macOS binary
        run: |
          file artifacts/kunlun-macos/kunlun
