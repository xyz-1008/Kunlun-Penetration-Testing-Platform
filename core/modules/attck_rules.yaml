# ATT&CK Custom Mapping Rules for Kunlun Penetration Testing Platform
# 自定义映射规则配置文件
# 
# 规则格式说明:
# - rule_id: 规则唯一标识符
# - name: 规则名称
# - description: 规则描述
# - operation_types: 匹配的操作类型列表
# - keywords: 匹配的关键字列表（不区分大小写）
# - regex_pattern: 正则表达式匹配模式
# - attck_technique_id: 对应的ATT&CK技术ID
# - confidence: 置信度 (exact/high/medium/low/fuzzy)
# - priority: 优先级（数字越大优先级越高，自定义规则建议>150）
# - enabled: 是否启用
#
# 匹配逻辑:
# 1. 操作类型匹配: operation_type 必须在 operation_types 列表中
# 2. 关键字匹配: 操作描述包含任意关键字即匹配
# 3. 正则匹配: 操作描述匹配正则表达式
# 4. 满足任一条件即触发映射

rules:
  # ==================== 初始访问 (Initial Access) ====================
  - rule_id: "custom-001"
    name: "SQL Injection Exploit"
    description: "SQL注入漏洞利用映射到T1190"
    operation_types:
      - "sqli"
      - "sql_injection"
      - "poc_execute"
    keywords:
      - "sql injection"
      - "sqli"
      - "union select"
      - "sqlmap"
      - "SQL注入"
    regex_pattern: "(?i)(union\\s+select|sqlmap|sql\\s*injection)"
    attck_technique_id: "T1190"
    confidence: "exact"
    priority: 200
    enabled: true

  - rule_id: "custom-002"
    name: "Phishing Email"
    description: "钓鱼邮件攻击映射到T1566"
    operation_types:
      - "phishing"
      - "email_attack"
    keywords:
      - "phishing"
      - "spear phishing"
      - "钓鱼"
      - "恶意附件"
      - "恶意链接"
    attck_technique_id: "T1566"
    confidence: "exact"
    priority: 200
    enabled: true

  - rule_id: "custom-003"
    name: "External Remote Services"
    description: "外部远程服务利用映射到T1133"
    operation_types:
      - "remote_service"
      - "vpn_exploit"
    keywords:
      - "vpn"
      - "citrix"
      - "external remote"
      - "远程服务"
      - "8080"
      - "443"
    attck_technique_id: "T1133"
    confidence: "high"
    priority: 180
    enabled: true

  # ==================== 执行 (Execution) ====================
  - rule_id: "custom-004"
